version: '3.8'

services:
  backend:
    build:
      context: ./Backend
    container_name: modulematch-backend
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
    container_name: modulematch-frontend
    ports:
      - "8501:8501"
    volumes:
      - ./Frontend:/app
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
